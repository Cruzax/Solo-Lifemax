<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solo Lifemax</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">◆</span>
          <span class="logo-text">Solo Lifemax</span>
        </div>
        <div class="level-badge">
          <span class="level-label" data-i18n="level">NIVEAU</span>
          <span class="level-number" id="user-level">1</span>
        </div>
      </div>
    </header>

    <!-- Navigation -->
    <nav class="nav">
      <button class="nav-btn active" data-page="dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span data-i18n="dashboard">Tableau de bord</span>
      </button>
      <button class="nav-btn" data-page="quests">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span data-i18n="quests">Quêtes</span>
      </button>
    </nav>

    <!-- Dashboard Page -->
    <main class="page active" id="page-dashboard">
      <div class="page-header">
        <h1 data-i18n="yourStats">Tes Stats</h1>
        <p class="subtitle" data-i18n="statsSubtitle">Suis ta progression dans la vraie vie</p>
      </div>

      <div class="xp-bar-container">
        <div class="xp-bar-label">
          <span data-i18n="xpProgress">Progression XP</span>
          <span id="xp-text">0 / 100</span>
        </div>
        <div class="xp-bar">
          <div class="xp-bar-fill" id="xp-fill" style="width: 0%"></div>
        </div>
      </div>

      <div class="stats-grid" id="stats-grid">
        <!-- Stats cards injected by JS -->
      </div>

      <div class="today-summary">
        <h2 data-i18n="todayProgress">Progrès du jour</h2>
        <div class="summary-row">
          <span data-i18n="questsCompleted">Quêtes terminées</span>
          <span id="quests-done-count">0 / 5</span>
        </div>
        <div class="summary-row">
          <span data-i18n="remixesUsed">Remix utilisés</span>
          <span id="remix-count">0 / 1</span>
        </div>
      </div>
    </main>

    <!-- Quests Page -->
    <main class="page" id="page-quests">
      <div class="page-header">
        <h1 data-i18n="dailyQuests">Quêtes du jour</h1>
        <p class="subtitle" id="quests-date"></p>
      </div>

      <div class="quests-list" id="quests-list">
        <!-- Quest cards injected by JS -->
      </div>

      <div class="quests-footer" id="quests-footer">
        <p class="quests-hint" data-i18n="questsHint">Termine toutes les quêtes pour maximiser tes stats.</p>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
